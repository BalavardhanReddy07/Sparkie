<template>
    <div class="doc-selector-root">

        <!-- ── Header ─────────────────────────────────────────────────────── -->
        <div class="doc-selector-header">
            <span class="doc-selector-icon">
                <!-- Book / Library icon (inline SVG – no static resource needed) -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                     width="20" height="20" fill="currentColor" aria-hidden="true">
                    <path d="M19 2H6a3 3 0 0 0-3 3v14a3 3 0 0 0 3 3h13a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zm-1 18H6a1 1 0 0 1 0-2h12v2zm0-4H6a3 3 0 0 0-1 .18V5a1 1 0 0 1 1-1h12v12z"/>
                    <path d="M9 7h6a1 1 0 0 0 0-2H9a1 1 0 0 0 0 2zm0 4h6a1 1 0 0 0 0-2H9a1 1 0 0 0 0 2zm0 4h4a1 1 0 0 0 0-2H9a1 1 0 0 0 0 2z"/>
                </svg>
            </span>
            <h2 class="doc-selector-title">L2 Documents of Brighter Library</h2>
        </div>

        <!-- ── Loading spinner ────────────────────────────────────────────── -->
        <template if:true={_isLoading}>
            <div class="doc-selector-loading">
                <lightning-spinner alternative-text="Loading documents…"
                                   size="small"
                                   variant="brand">
                </lightning-spinner>
                <span class="loading-label">Loading documents…</span>
            </div>
        </template>

        <!-- ── Error state ────────────────────────────────────────────────── -->
        <template if:true={hasError}>
            <div class="doc-selector-error" role="alert">
                <lightning-icon icon-name="utility:error"
                                size="x-small"
                                alternative-text="Error"
                                variant="error">
                </lightning-icon>
                <span>{_errorMessage}</span>
            </div>
        </template>

        <!-- ── Empty state ────────────────────────────────────────────────── -->
        <template if:false={_isLoading}>
            <template if:false={hasError}>
                <template if:false={hasDocuments}>
                    <div class="doc-selector-empty">
                        <lightning-icon icon-name="utility:file"
                                        size="small"
                                        alternative-text="No documents"
                                        class="empty-icon">
                        </lightning-icon>
                        <p>No L2 documents found for Brighter Library.</p>
                    </div>
                </template>
            </template>
        </template>

        <!-- ── Document list ──────────────────────────────────────────────── -->
        <template if:true={hasDocuments}>
            <div class="doc-selector-body">

                <!-- Select All row -->
                <div class="doc-row doc-row--select-all">
                    <label class="doc-checkbox-label">
                        <input type="checkbox"
                               class="doc-checkbox"
                               checked={selectAllChecked}
                               data-indeterminate={selectAllIndeterminate}
                               onchange={handleSelectAll}
                               disabled={isReadOnly}
                               aria-label="Select all documents" />
                        <span class="doc-checkbox-custom"></span>
                        <span class="doc-name doc-name--bold">Select All</span>
                    </label>
                    <template if:true={hasSelection}>
                        <span class="doc-selection-badge">{selectedCount} selected</span>
                    </template>
                </div>

                <div class="doc-divider" role="separator"></div>

                <!-- Individual document rows -->
                <template for:each={_documents} for:item="doc">
                    <div key={doc.recordId}
                         class="doc-row"
                         data-id={doc.recordId}>

                        <label class="doc-checkbox-label">
                            <input type="checkbox"
                                   class="doc-checkbox"
                                   checked={doc.checked}
                                   data-id={doc.recordId}
                                   onchange={handleDocCheck}
                                   disabled={isReadOnly}
                                   aria-label={doc.documentName} />
                            <span class="doc-checkbox-custom"></span>
                            <span class="doc-name">{doc.documentName}</span>
                        </label>

                        <!-- Warning badge (shown only when doc has warning text) -->
                        <template if:true={doc.hasWarning}>
                            <span class="doc-warning-badge" title={doc.warningText}
                                  aria-label="This document has a warning">
                                <lightning-icon icon-name="utility:warning"
                                                size="xx-small"
                                                variant="warning"
                                                alternative-text="Warning">
                                </lightning-icon>
                            </span>
                        </template>

                    </div>
                </template>
            </div>

            <!-- ── Selection summary ──────────────────────────────────────── -->
            <template if:true={hasSelection}>
                <div class="doc-selector-summary" role="status" aria-live="polite">
                    <lightning-icon icon-name="utility:check"
                                    size="xx-small"
                                    variant="success"
                                    alternative-text="Selected">
                    </lightning-icon>
                    <span>{selectedCount} document(s) selected</span>
                </div>
            </template>
        </template>

        <!-- ── Warning confirmation modal ────────────────────────────────── -->
        <template if:true={_showWarningModal}>
            <section class="warning-modal-backdrop" role="dialog"
                     aria-modal="true" aria-labelledby="warningModalTitle">
                <div class="warning-modal">
                    <div class="warning-modal-header">
                        <lightning-icon icon-name="utility:warning"
                                        size="small"
                                        variant="warning"
                                        alternative-text="Warning">
                        </lightning-icon>
                        <span id="warningModalTitle" class="warning-modal-title">
                            Document Warning
                        </span>
                    </div>
                    <div class="warning-modal-body">
                        <p>{_activeWarning}</p>
                    </div>
                    <div class="warning-modal-footer">
                        <lightning-button label="Cancel"
                                          variant="neutral"
                                          onclick={handleWarningCancel}>
                        </lightning-button>
                        <lightning-button label="Proceed Anyway"
                                          variant="brand"
                                          onclick={handleWarningConfirm}>
                        </lightning-button>
                    </div>
                </div>
            </section>
        </template>

    </div>
</template>
